<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Lesion Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 2rem;
        }
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
        }
        #video {
            width: 100%;
            border-radius: 10px;
        }
        #canvas {
            display: none;
        }
        .capture-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        .result-container {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background-color: #f8f9fa;
        }
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .probability-bar {
            height: 25px;
            margin: 5px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-container">
            <h1 class="text-center mb-4">Skin Lesion Classifier</h1>
            
            <!-- Tab Navigation -->
            <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="camera-tab" data-bs-toggle="tab" data-bs-target="#camera" type="button">Camera</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="upload-tab" data-bs-toggle="tab" data-bs-target="#upload" type="button">Upload Image</button>
                </li>
            </ul>
            
            <!-- Tab Content -->
            <div class="tab-content" id="myTabContent">
                <!-- Camera Tab -->
                <div class="tab-pane fade show active" id="camera">
                    <div class="camera-container mb-3">
                        <video id="video" autoplay playsinline></video>
                        <canvas id="canvas"></canvas>
                        <button id="capture-btn" class="btn btn-primary capture-btn">Capture Image</button>
                    </div>
                </div>
                
                <!-- Upload Tab -->
                <div class="tab-pane fade" id="upload">
                    <div class="text-center">
                        <input type="file" id="file-input" class="form-control mb-3" accept="image/*">
                    </div>
                </div>
            </div>
            
            <!-- Results Section -->
            <div id="result" class="result-container" style="display: none;">
                <h3 class="text-center mb-3">Results</h3>
                <div class="text-center">
                    <img id="preview" class="preview-image">
                </div>
                <div class="mt-3">
                    <h4 id="prediction" class="text-center"></h4>
                    <div id="confidence" class="text-center mb-3"></div>
                    <div id="probabilities"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Camera handling
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const fileInput = document.getElementById('file-input');
        const result = document.getElementById('result');
        const preview = document.getElementById('preview');
        
        // Start camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error('Error accessing camera:', err);
                alert('Error accessing camera. Please make sure you have granted camera permissions.');
            }
        }

        // Initialize camera when camera tab is shown
        document.getElementById('camera-tab').addEventListener('click', startCamera);
        
        // Capture image
        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Convert to base64
            const imageData = canvas.toDataURL('image/jpeg');
            
            // Send to server
            fetch('/capture', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ image: imageData })
            })
            .then(response => response.json())
            .then(handleResult)
            .catch(handleError);
        });
        
        // Handle file upload
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(handleResult)
            .catch(handleError);
        });
        
        // Handle results
        function handleResult(data) {
            if (!data.success) {
                alert('Error: ' + data.error);
                return;
            }
            
            // Show results
            result.style.display = 'block';
            
            // Update image path with absolute URL if needed
            const imagePath = data.image_path.startsWith('/') ? data.image_path : '/' + data.image_path;
            preview.src = imagePath;
            
            document.getElementById('prediction').textContent = `Prediction: ${data.prediction}`;
            document.getElementById('confidence').textContent = `Confidence: ${data.confidence}`;
            
            // Show probability bars
            const probContainer = document.getElementById('probabilities');
            probContainer.innerHTML = '';
            
            for (const [className, probability] of Object.entries(data.probabilities)) {
                const prob = parseFloat(probability);
                const div = document.createElement('div');
                div.className = 'mb-2';
                div.innerHTML = `
                    <div class="d-flex justify-content-between">
                        <span>${className}</span>
                        <span>${probability}</span>
                    </div>
                    <div class="progress">
                        <div class="progress-bar" role="progressbar" 
                             style="width: ${prob}%" 
                             aria-valuenow="${prob}" 
                             aria-valuemin="0" 
                             aria-valuemax="100">
                        </div>
                    </div>
                `;
                probContainer.appendChild(div);
            }
        }
        
        function handleError(error) {
            console.error('Error:', error);
            alert('An error occurred. Please try again.');
        }
        
        // Start camera on page load
        startCamera();
        
        // Handle tab switching
        document.getElementById('upload-tab').addEventListener('click', () => {
            // Stop camera when switching to upload tab
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
        
        document.getElementById('camera-tab').addEventListener('click', () => {
            // Restart camera when switching back to camera tab
            startCamera();
        });
    </script>
</body>
</html>
